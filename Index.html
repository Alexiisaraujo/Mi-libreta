<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Death Note</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --red: #8b0000;
    --red-bright: #cc0000;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --ink: #1a1008;
    --gold: #8b6914;
    --shadow: rgba(0,0,0,0.8);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Special Elite', serif;
    overflow-x: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,0,0,0.05) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 700px;
    padding: 18px 20px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(139,0,0,0.6), 2px 2px 0 var(--red);
    user-select: none;
  }
  .logo span { color: var(--red-bright); }

  .page-counter {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 2px;
  }

  /* BOOK CONTAINER */
  .book-wrap {
    width: 100%;
    max-width: 680px;
    padding: 0 12px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .book {
    position: relative;
    background: var(--black);
    border-radius: 4px 12px 12px 4px;
    box-shadow:
      -6px 0 0 #1a1a1a,
      -10px 0 0 #111,
      0 20px 60px rgba(0,0,0,0.9),
      0 0 0 1px rgba(139,0,0,0.3),
      inset 0 0 40px rgba(0,0,0,0.5);
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 500px;
  }

  /* SPINE decoration */
  .book::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 18px;
    background: linear-gradient(to right, #0a0a0a, #1c1c1c, #0d0d0d);
    border-right: 1px solid rgba(139,0,0,0.3);
    z-index: 10;
  }

  /* Red lines decoration on spine */
  .book::after {
    content: 'DEATH NOTE';
    position: absolute;
    left: 2px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-family: 'Cinzel', serif;
    font-size: 7px;
    letter-spacing: 3px;
    color: rgba(139,0,0,0.5);
    z-index: 11;
    white-space: nowrap;
  }

  /* PAGE */
  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--cream);
    margin-left: 18px;
    position: relative;
    overflow: hidden;
  }

  /* Ruled lines background */
  .page-lines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 31px,
      rgba(100,80,60,0.15) 31px,
      rgba(100,80,60,0.15) 32px
    );
    background-position: 0 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  .page-margin {
    position: absolute;
    left: 52px;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(180,30,30,0.35);
    pointer-events: none;
    z-index: 1;
  }

  /* Page curl effect bottom-right */
  .page-curl {
    position: absolute;
    bottom: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(225deg, #ccc8bc 40%, var(--cream-dark) 100%);
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    z-index: 5;
    cursor: pointer;
    transition: all 0.3s;
    filter: drop-shadow(-3px -3px 5px rgba(0,0,0,0.25));
  }
  .page-curl:hover { width: 55px; height: 55px; }
  .page-curl::after {
    content: '›';
    position: absolute;
    bottom: 6px; right: 8px;
    font-size: 14px;
    color: rgba(100,80,60,0.5);
  }

  /* PAGE CONTENT */
  .page-header {
    position: relative;
    z-index: 2;
    padding: 16px 20px 10px 60px;
    border-bottom: 2px solid rgba(139,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .page-title-input {
    flex: 1;
    min-width: 120px;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 1px;
    caret-color: var(--red);
  }
  .page-title-input::placeholder { color: rgba(100,80,60,0.35); font-weight: 400; }

  .page-date {
    font-size: 11px;
    color: rgba(100,80,60,0.5);
    white-space: nowrap;
    font-family: 'Special Elite', serif;
  }

  /* WRITING AREA */
  .writing-area {
    position: relative;
    z-index: 2;
    flex: 1;
    padding: 8px 20px 50px 60px;
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 350px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Special Elite', serif;
    font-size: clamp(14px, 3.5vw, 16px);
    line-height: 32px;
    color: var(--ink);
    caret-color: var(--red);
    letter-spacing: 0.3px;
  }
  textarea::placeholder { color: rgba(100,80,60,0.3); }
  textarea::-webkit-scrollbar { display: none; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: relative;
    z-index: 3;
    padding: 10px 20px 12px 60px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(100,80,60,0.15);
    background: rgba(245,240,232,0.9);
    flex-wrap: wrap;
  }

  .word-count {
    font-size: 11px;
    color: rgba(100,80,60,0.4);
    flex: 1;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(100,80,60,0.25);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: 'Special Elite', serif;
    font-size: 12px;
    color: rgba(100,80,60,0.7);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover {
    background: rgba(139,0,0,0.08);
    border-color: var(--red);
    color: var(--red);
  }
  .btn.danger { border-color: rgba(139,0,0,0.2); }
  .btn.danger:hover { background: rgba(139,0,0,0.12); }

  /* PAGE FLIP ANIMATION */
  @keyframes flipLeft {
    0%   { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
    100% { transform: perspective(1200px) rotateY(-90deg); opacity: 0; }
  }
  @keyframes flipRight {
    0%   { transform: perspective(1200px) rotateY(90deg); opacity: 0; }
    100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
  }
  @keyframes flipLeftPrev {
    0%   { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
    100% { transform: perspective(1200px) rotateY(90deg); opacity: 0; }
  }
  @keyframes flipRightPrev {
    0%   { transform: perspective(1200px) rotateY(-90deg); opacity: 0; }
    100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
  }

  .page.flip-out-next { animation: flipLeft 0.35s ease-in forwards; transform-origin: left center; }
  .page.flip-in-next  { animation: flipRight 0.35s ease-out forwards; transform-origin: left center; }
  .page.flip-out-prev { animation: flipLeftPrev 0.35s ease-in forwards; transform-origin: left center; }
  .page.flip-in-prev  { animation: flipRightPrev 0.35s ease-out forwards; transform-origin: left center; }

  /* NAV ARROWS */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 8px 0;
    max-width: 680px;
    width: 100%;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid rgba(139,0,0,0.3);
    border-radius: 6px;
    padding: 8px 18px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: rgba(245,240,232,0.5);
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1px;
  }
  .nav-btn:hover {
    background: rgba(139,0,0,0.15);
    color: var(--cream);
    border-color: var(--red-bright);
    box-shadow: 0 0 12px rgba(139,0,0,0.3);
  }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn:disabled:hover { background: transparent; color: rgba(245,240,232,0.5); border-color: rgba(139,0,0,0.3); box-shadow: none; }

  .new-page-btn {
    background: var(--red);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--cream);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .new-page-btn:hover { background: var(--red-bright); box-shadow: 0 0 15px rgba(204,0,0,0.4); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(10,10,10,0.92);
    color: var(--cream);
    border: 1px solid rgba(139,0,0,0.4);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Special Elite', serif;
    letter-spacing: 1px;
    transition: transform 0.3s, opacity 0.3s;
    opacity: 0;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 480px) {
    .page-header { padding-left: 42px; }
    .writing-area { padding-left: 42px; }
    .bottom-bar { padding-left: 42px; gap: 6px; }
    .btn { padding: 5px 7px; font-size: 11px; }
    textarea { min-height: 280px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DEATH <span>NOTE</span></div>
  <div class="page-counter" id="pageCounter">Página 1 de 1</div>
</header>

<div class="book-wrap">
  <div class="book">
    <div class="page" id="currentPage">
      <div class="page-lines"></div>
      <div class="page-margin"></div>

      <div class="page-header">
        <input class="page-title-input" id="titleInput" type="text" placeholder="Título de la página..." maxlength="60">
        <div class="page-date" id="pageDate"></div>
      </div>

      <div class="writing-area">
        <textarea id="noteArea" placeholder="Escribe aquí..."></textarea>
      </div>

      <div class="bottom-bar">
        <div class="word-count" id="wordCount">0 palabras</div>
        <div class="toolbar">
          <button class="btn" onclick="copyText()" title="Copiar todo">Copiar</button>
          <button class="btn danger" onclick="clearPage()" title="Limpiar página">Limpiar</button>
          <button class="btn" onclick="downloadPage()" title="Descargar">↓ Guardar</button>
        </div>
      </div>

      <div class="page-curl" onclick="nextPage()" title="Siguiente página"></div>
    </div>
  </div>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" onclick="prevPage()" disabled>← Anterior</button>
  <button class="new-page-btn" onclick="newPage()">+ Nueva página</button>
  <button class="nav-btn" id="nextBtn" onclick="nextPage()" disabled>Siguiente →</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- STATE ----
  let pages = [{ title: '', text: '', date: today() }];
  let current = 0;
  let isAnimating = false;

  // ---- LOAD FROM STORAGE ----
  (function() {
    const saved = localStorage.getItem('deathnote_pages');
    const savedIdx = localStorage.getItem('deathnote_idx');
    if (saved) {
      try { pages = JSON.parse(saved); } catch(e){}
    }
    if (savedIdx) current = parseInt(savedIdx) || 0;
    renderPage();
  })();

  // ---- RENDER ----
  function renderPage() {
    const p = pages[current];
    document.getElementById('titleInput').value = p.title;
    document.getElementById('noteArea').value = p.text;
    document.getElementById('pageDate').textContent = p.date;
    updateWordCount();
    updateCounter();
    updateNav();
  }

  function saveCurrent() {
    pages[current].title = document.getElementById('titleInput').value;
    pages[current].text = document.getElementById('noteArea').value;
    localStorage.setItem('deathnote_pages', JSON.stringify(pages));
    localStorage.setItem('deathnote_idx', current);
  }

  function updateWordCount() {
    const txt = document.getElementById('noteArea').value.trim();
    const words = txt ? txt.split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = words + ' palabra' + (words !== 1 ? 's' : '');
  }

  function updateCounter() {
    document.getElementById('pageCounter').textContent = `Página ${current + 1} de ${pages.length}`;
  }

  function updateNav() {
    document.getElementById('prevBtn').disabled = current === 0;
    document.getElementById('nextBtn').disabled = current === pages.length - 1;
  }

  // ---- NAVIGATION WITH FLIP ----
  function flipTo(dir) {
    if (isAnimating) return;
    saveCurrent();

    const page = document.getElementById('currentPage');
    const outClass = dir === 'next' ? 'flip-out-next' : 'flip-out-prev';
    const inClass  = dir === 'next' ? 'flip-in-next'  : 'flip-in-prev';

    isAnimating = true;
    page.classList.add(outClass);

    setTimeout(() => {
      page.classList.remove(outClass);
      current += (dir === 'next' ? 1 : -1);
      renderPage();
      page.classList.add(inClass);
      setTimeout(() => {
        page.classList.remove(inClass);
        isAnimating = false;
      }, 350);
    }, 300);
  }

  function nextPage() {
    if (current < pages.length - 1) flipTo('next');
  }

  function prevPage() {
    if (current > 0) flipTo('prev');
  }

  function newPage() {
    saveCurrent();
    pages.push({ title: '', text: '', date: today() });
    const oldCurrent = current;
    current = pages.length - 1;

    const page = document.getElementById('currentPage');
    page.classList.add('flip-out-next');
    setTimeout(() => {
      page.classList.remove('flip-out-next');
      renderPage();
      page.classList.add('flip-in-next');
      setTimeout(() => { page.classList.remove('flip-in-next'); }, 350);
    }, 300);

    showToast('Nueva página creada');
  }

  // ---- TOOLS ----
  function clearPage() {
    if (!confirm('¿Limpiar esta página?')) return;
    document.getElementById('noteArea').value = '';
    document.getElementById('titleInput').value = '';
    saveCurrent();
    updateWordCount();
  }

  function copyText() {
    const title = document.getElementById('titleInput').value;
    const text = document.getElementById('noteArea').value;
    const full = (title ? title + '\n\n' : '') + text;
    navigator.clipboard.writeText(full).then(() => showToast('Copiado al portapapeles'));
  }

  function downloadPage() {
    const title = document.getElementById('titleInput').value || `pagina-${current + 1}`;
    const text = document.getElementById('noteArea').value;
    const full = (document.getElementById('titleInput').value ? document.getElementById('titleInput').value + '\n' + '─'.repeat(40) + '\n\n' : '') + text;
    const blob = new Blob([full], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = title.replace(/\s+/g, '-').toLowerCase() + '.txt';
    a.click();
    showToast('Página descargada');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function today() {
    return new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // ---- EVENTS ----
  document.getElementById('noteArea').addEventListener('input', () => {
    updateWordCount();
    saveCurrent();
  });
  document.getElementById('titleInput').addEventListener('input', saveCurrent);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'ArrowRight') { e.preventDefault(); nextPage(); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); prevPage(); }
      if (e.key === 'Enter')      { e.preventDefault(); newPage(); }
    }
  });

  // Swipe on mobile
  let touchStartX = 0;
  document.querySelector('.book').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.querySelector('.book').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) nextPage();
      else prevPage();
    }
  }, { passive: true });
</script>
</body>
</html>
